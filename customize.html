<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Play with your Food! - Starch & Steel</title>

    <link rel="stylesheet" href="customize.css">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <div class="customizer-container">
        <div class="header">
            <a href="index.html" class="back-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back
            </a>
            <h1>Play with your Food!</h1>
        </div>

        <div class="character-preview">
            <img id="layer-body" class="character-layer" src="" alt="Body">
            <img id="layer-face" class="character-layer" src="" alt="Face">
            <img id="layer-acc1" class="character-layer" src="" alt="Accessory 1">
            <img id="layer-acc2" class="character-layer" src="" alt="Accessory 2">
            <img id="layer-hat" class="character-layer" src="" alt="Hat">
        </div>

        <div class="controls-container">
            <div class="control-group">
                <button class="arrow-btn" id="btn-body-prev" aria-label="Previous Food">&lt;</button>
                <span class="control-label">Food</span>
                <button class="arrow-btn" id="btn-body-next" aria-label="Next Food">&gt;</button>
            </div>

            <div class="control-group">
                <button class="arrow-btn" id="btn-face-prev" aria-label="Previous Face">&lt;</button>
                <span class="control-label">Face</span>
                <button class="arrow-btn" id="btn-face-next" aria-label="Next Face">&gt;</button>
            </div>

            <div class="control-group">
                <button class="arrow-btn" id="btn-hat-prev" aria-label="Previous Hat">&lt;</button>
                <span class="control-label">Hat</span>
                <button class="arrow-btn" id="btn-hat-next" aria-label="Next Hat">&gt;</button>
            </div>

            <div class="control-group">
                <button class="arrow-btn" id="btn-acc1-prev" aria-label="Previous Accessory 1">&lt;</button>
                <span class="control-label">Accessory 1</span>
                <button class="arrow-btn" id="btn-acc1-next" aria-label="Next Accessory 1">&gt;</button>
            </div>

            <div class="control-group">
                <button class="arrow-btn" id="btn-acc2-prev" aria-label="Previous Accessory 2">&lt;</button>
                <span class="control-label">Accessory 2</span>
                <button class="arrow-btn" id="btn-acc2-next" aria-label="Next Accessory 2">&gt;</button>
            </div>
        </div>
    </div>
    <script src="customize.js"></script>
</body>
</html>
