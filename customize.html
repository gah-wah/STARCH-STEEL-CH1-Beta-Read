<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Play with your Food! - Starch & Steel</title>

    <link rel="stylesheet" href="customize.css?v=2">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <div class="customizer-container">
        <div class="header">
            <a href="index.html" class="back-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back
            </a>
            <h1>Play with your Food!</h1>
        </div>

        <div class="character-preview">
            <img id="layer-body" class="character-layer" src="">
            <img id="layer-face" class="character-layer" src="">
            <img id="layer-acc1" class="character-layer" src="">
            <img id="layer-acc2" class="character-layer" src="">
            <img id="layer-hat" class="character-layer" src="">
        </div>

        <div class="controls-container">
            <div class="control-group">
                <div class="list-number" id="num-body">1</div>
                <div class="selector-arrows">
                    <button class="arrow-btn" id="btn-body-prev" aria-label="Previous Food">&lt;</button>
                    <span class="control-label">Food</span>
                    <button class="arrow-btn" id="btn-body-next" aria-label="Next Food">&gt;</button>
                </div>
                <button class="refresh-btn" id="btn-body-refresh" aria-label="Bring Food to Front">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-10.26l5.08 5.08"/></svg>
                </button>
            </div>

            <div class="control-group">
                <div class="list-number" id="num-face">0</div>
                <div class="selector-arrows">
                    <button class="arrow-btn" id="btn-face-prev" aria-label="Previous Face">&lt;</button>
                    <span class="control-label">Face</span>
                    <button class="arrow-btn" id="btn-face-next" aria-label="Next Face">&gt;</button>
                </div>
                <button class="refresh-btn" id="btn-face-refresh" aria-label="Bring Face to Front">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-10.26l5.08 5.08"/></svg>
                </button>
            </div>

            <div class="control-group">
                <div class="list-number" id="num-hat">0</div>
                <div class="selector-arrows">
                    <button class="arrow-btn" id="btn-hat-prev" aria-label="Previous Hat">&lt;</button>
                    <span class="control-label">Hat</span>
                    <button class="arrow-btn" id="btn-hat-next" aria-label="Next Hat">&gt;</button>
                </div>
                <button class="refresh-btn" id="btn-hat-refresh" aria-label="Bring Hat to Front">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-10.26l5.08 5.08"/></svg>
                </button>
            </div>

            <div class="control-group">
                <div class="list-number" id="num-acc1">0</div>
                <div class="selector-arrows">
                    <button class="arrow-btn" id="btn-acc1-prev" aria-label="Previous Accessory 1">&lt;</button>
                    <span class="control-label">Accessory 1</span>
                    <button class="arrow-btn" id="btn-acc1-next" aria-label="Next Accessory 1">&gt;</button>
                </div>
                <button class="refresh-btn" id="btn-acc1-refresh" aria-label="Bring Accessory 1 to Front">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-10.26l5.08 5.08"/></svg>
                </button>
            </div>

            <div class="control-group">
                <div class="list-number" id="num-acc2">0</div>
                <div class="selector-arrows">
                    <button class="arrow-btn" id="btn-acc2-prev" aria-label="Previous Accessory 2">&lt;</button>
                    <span class="control-label">Accessory 2</span>
                    <button class="arrow-btn" id="btn-acc2-next" aria-label="Next Accessory 2">&gt;</button>
                </div>
                <button class="refresh-btn" id="btn-acc2-refresh" aria-label="Bring Accessory 2 to Front">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-10.26l5.08 5.08"/></svg>
                </button>
            </div>
        </div>
    </div>
    <script src="customize.js?v=2"></script>
</body>
</html>
