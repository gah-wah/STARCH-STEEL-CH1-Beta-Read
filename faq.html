<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ - Starch & Steel</title>
    <link rel="stylesheet" href="styles.css?v=45">
    <style>
        .faq-container {
            max-width: 400px;
            margin: 4rem auto;
            padding: 0 1.5rem;
            text-align: center;
            font-family: 'RetroNumbers', 'Georgia', 'Times New Roman', Times, serif;
        }
        .faq-title {
            font-size: 1.8rem;
            color: #ffcc00;
            margin-bottom: 2rem;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(255, 204, 0, 0.3);
        }
        .faq-content {
            line-height: 1.6;
            color: #cbd5e1;
        }
        .faq-back {
            display: inline-block;
            margin-top: 3rem;
            padding: 0.6rem 1.2rem;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .faq-back:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.4);
            color: #ffcc00;
        }
    </style>
</head>
<body>
    <div class="vhs-overlay"></div>
    <div class="faq-container">
        <h1 class="faq-title">FAQ</h1>
        <div class="faq-content">
            <p>Placeholder FAQ page. Content coming soon!</p>
        </div>
        <a href="index.html#reader" class="faq-back">BACK TO READER</a>
    </div>
</body>
</html>
