<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starch & Steel - Comic Reader</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="Read Starch & Steel, an epic vertical-scrolling webcomic.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- PWA & Add to Home Screen -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Starch & Steel">
    <meta name="theme-color" content="#0f1115">
    <link rel="apple-touch-icon" href="https://pub-aa22273331a84637a8fa5617ac53d5a0.r2.dev/stst4lgoogoootrans.png">
    <link rel="icon" type="image/png" href="https://pub-aa22273331a84637a8fa5617ac53d5a0.r2.dev/stst4iconguy2.png">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Intro Screen -->
    <div id="intro-screen" class="intro-screen">
        <img id="intro-landing-image" src="https://pub-aa22273331a84637a8fa5617ac53d5a0.r2.dev/stst4.png"
            alt="Starch & Steel Landing">
        <div class="intro-text">
            <p>Welcome to the CHAPTER 1 Beta Read for STARCH & STEEL!</p>
            <p>Please read on PHONE.</p>
            <p>Tap the door below to read</p>
            <p>and plz leave feedback on the Google Form :)</p>
        </div>
        <img id="intro-image" src="https://pub-aa22273331a84637a8fa5617ac53d5a0.r2.dev/Fridge%20Door%20Closed.png"
            alt="Fridge Door Closed">
    </div>

    <header class="top-nav">
        <div class="nav-content">
            <img class="comic-logo" src="https://pub-aa22273331a84637a8fa5617ac53d5a0.r2.dev/stst4lgoogoootrans.png"
                alt="Starch & Steel Logo">
            <h2 class="chapter-title" id="chapter-title">Loading...</h2>
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </header>

    <main class="comic-container" id="comic-container">
        <!-- Comic images will be dynamically injected here -->
        <div class="loading-spinner" id="loading-indicator">
            <div class="spinner"></div>
            <p>Loading Chapter...</p>
        </div>
    </main>

    <div class="bottom-nav" id="bottom-nav"></div>

    <button class="back-to-top" id="back-to-top" aria-label="Back to top">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#ffffff" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L22 18H2L12 2Z" />
        </svg>
    </button>

    <footer class="site-footer">
        <p>&copy; <span id="current-year"></span> Starch & Steel. All rights reserved.</p>
    </footer>

    <!-- Custom JS -->
    <script src="script.js"></script>
</body>

</html>
