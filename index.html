<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starch & Steel - Comic Reader</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Read Starch & Steel, an epic vertical-scrolling webcomic.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="top-nav">
        <div class="nav-content">
            <img class="comic-logo" src="https://pub-aa22273331a84637a8fa5617ac53d5a0.r2.dev/stst4lgoogoootrans.png" alt="Starch & Steel Logo">
            <h2 class="chapter-title" id="chapter-title">Loading...</h2>
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </header>

    <main class="comic-container" id="comic-container">
        <!-- Comic images will be dynamically injected here -->
        <div class="loading-spinner" id="loading-indicator">
            <div class="spinner"></div>
            <p>Loading Chapter...</p>
        </div>
    </main>

    <button class="back-to-top" id="back-to-top" aria-label="Back to top">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#ffffff" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L22 18H2L12 2Z" />
        </svg>
    </button>

    <footer class="site-footer">
        <p>&copy; <span id="current-year"></span> Starch & Steel. All rights reserved.</p>
    </footer>

    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
